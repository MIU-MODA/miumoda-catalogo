<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miu Moda ✨ Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0810;--surface:#180d1a;--card:#201025;--border:#4a1f45;--accent:#e8689a;--accent2:#f4a7c3;--gold:#f0c97a;--text:#fdf0ff;--muted:#c09ab0;--green:#7edfa8;--red:#f07e7e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 0% 0%,#3a0d5a44 0%,transparent 55%),radial-gradient(ellipse at 100% 100%,#5a0d3a44 0%,transparent 55%);}
.header{text-align:center;padding:36px 24px 20px;}
.header::after{content:'';display:block;width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),var(--accent),transparent);margin:20px auto 0;}
.logo{height:clamp(100px,16vw,165px);width:auto;border-radius:14px;filter:drop-shadow(0 0 24px #e8689a55);animation:glow 3s ease-in-out infinite;}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 18px #e8689a66);}50%{filter:drop-shadow(0 0 36px #f4a7c399);}}
.tagline{margin-top:8px;font-size:13px;color:var(--muted);font-style:italic;}
.bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:0 24px 18px;flex-wrap:wrap;}
.bar input,.bar select{background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:8px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.bar input:focus,.bar select:focus{border-color:var(--accent);}
.bar select option{background:var(--card);}
.sep{width:1px;height:20px;background:var(--border);}
.pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 24px 18px;}
.pill{padding:6px 16px;border-radius:30px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s;}
.pill:hover{border-color:var(--accent);color:var(--accent2);}
.pill.on{background:linear-gradient(135deg,var(--accent),#c4507e);border-color:transparent;color:#fff;}
.cnt{text-align:center;font-size:12px;color:var(--muted);padding-bottom:14px;}
.cnt b{color:var(--accent2);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;padding:0 20px 60px;max-width:1400px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;}
.card:hover{transform:translateY(-5px);box-shadow:0 16px 40px #e8689a22;border-color:#6a2080;}
.card.foto{cursor:zoom-in;}
.card.foto .ci{transition:transform .3s;}
.card.foto:hover .ci{transform:scale(1.05);}
.cw{position:relative;}
.ci{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.cn{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#1e1030,#2a1040);display:flex;align-items:center;justify-content:center;font-size:50px;}
.cc{position:absolute;top:8px;left:8px;background:#00000099;backdrop-filter:blur(6px);border:1px solid #fff2;border-radius:20px;padding:3px 9px;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--accent2);}
.cb{padding:12px 14px 14px;}
.nm{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.25;margin-bottom:2px;}
.mk{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.pr{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pv{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);}
.st{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.ok{background:#1a3a2a;color:var(--green);}
.fw{background:#3a2a0a;color:var(--gold);}
.no{background:#3a1a1a;color:var(--red);}
.hint{text-align:center;font-size:10px;color:#6a3a7a;padding:3px 0 5px;letter-spacing:.5px;}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);}
.empty h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:8px;color:var(--accent2);}
.wa{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;border:none;border-radius:50px;padding:11px 18px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 18px #25D36655;text-decoration:none;z-index:60;transition:all .2s;}
.wa:hover{transform:translateY(-2px);}
.ubar{text-align:center;font-size:11px;color:#4a2a5a;padding:8px;border-top:1px solid #1e0e28;}
.lb{display:none;position:fixed;inset:0;z-index:200;background:#000d;backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;cursor:zoom-out;}
.lb.open{display:flex;}
.lbi{position:relative;max-width:min(90vw,680px);display:flex;flex-direction:column;align-items:center;gap:12px;}
.lbimg{max-width:100%;max-height:68vh;object-fit:contain;border-radius:16px;box-shadow:0 0 60px #e8689a44;border:2px solid #4a1f55;}
.lbinfo{text-align:center;background:#1a0d22cc;backdrop-filter:blur(10px);border:1px solid #4a1f55;border-radius:14px;padding:12px 24px;}
.lbn{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:2px;}
.lbm{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.lbp{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--gold);}
.lbs{font-size:12px;font-weight:600;padding:3px 11px;border-radius:20px;display:inline-block;margin-top:6px;}
.lbx{position:absolute;top:-12px;right:-12px;width:32px;height:32px;background:#2a1040;border:1px solid #6a2080;border-radius:50%;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lbx:hover{background:var(--accent);}
@media(max-width:500px){.grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 10px 40px;}}
</style>
</head>
